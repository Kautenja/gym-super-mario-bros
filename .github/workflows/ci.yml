name: CI

'on':
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            artifact: linux-x64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
          - name: Windows x64
            runner: windows-2022
            artifact: windows-x64
          - name: macOS x64
            runner: macos-15-intel
            artifact: macos-x64
          - name: macOS arm64
            runner: macos-15
            artifact: macos-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install .

      - name: Run tests
        run: python -m unittest discover .

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: gym-super-mario-bros-${{ matrix.artifact }}-dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Attach tag release artifacts
    needs: build-test
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: gym-super-mario-bros-*-dist
          path: release-dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Automated release for $TAG_NAME"
          gh release upload "$TAG_NAME" release-dist/* --clobber
